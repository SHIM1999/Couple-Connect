services:
  - type: web
    name: couple-connect-api
    runtime: node
    region: singapore
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Supabase connection string in Render dashboard
      - key: NODE_ENV
        value: production
