services:
  - type: web
    name: couple-connect-api
    runtime: node
    region: singapore
    buildCommand: npx --yes pnpm@11.1.2 install --ignore-scripts --frozen-lockfile && npx --yes pnpm@11.1.2 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Supabase connection string in Render dashboard
      - key: NODE_ENV
        value: production
